    document.addEventListener("DOMContentLoaded", function () {
      let slug = null;

      // âœ… 1. Try new URL format (/singleblog.html/slug)
      const pathParts = window.location.pathname.split("/");
      slug = pathParts[pathParts.length - 1];

      // â— If only "singleblog.html" then ignore
      if (!slug || slug === "blog.html") {
        slug = null;
      }

      // âœ… 2. Fallback (old ?slug=)
      if (!slug) {
        const params = new URLSearchParams(window.location.search);
        slug = params.get("slug");
      }

      if (slug) {
        console.log("Slug:", slug);
        loadBlogDetails(slug);
      } else {
        console.error("No blog Slug provided in URL.");
      }

      loadRecentBlogs();
    });

  <script>
    const tripTabs = document.querySelectorAll(".trip-tab");
    const tripContents = document.querySelectorAll(".trip-content");

    tripTabs.forEach((tab) => {
      tab.addEventListener("click", function () {
        const target = this.getAttribute("data-tab");

        tripContents.forEach((content) => content.classList.add("hidden"));

        tripTabs.forEach((btn) => {
          btn.classList.remove(
            "bg-[#d5e880]",
            "text-slate-900",
            "border-[#d5e880]",
            "shadow-sm",
          );
          btn.classList.add("bg-white", "text-slate-700", "border-slate-200");
        });

        document.getElementById(target).classList.remove("hidden");

        this.classList.remove(
          "bg-white",
          "text-slate-700",
          "border-slate-200",
        );
        this.classList.add(
          "bg-[#d5e880]",
          "text-slate-900",
          "border-[#d5e880]",
          "shadow-sm",
        );
      });
    });

    const mainTripImage = document.getElementById("mainTripImage");
    const thumbButtons = document.querySelectorAll(".thumb-btn");

    thumbButtons.forEach((btn) => {
      btn.addEventListener("click", function () {
        const newImage = this.getAttribute("data-image");
        mainTripImage.src = newImage;

        thumbButtons.forEach((item) => {
          item.classList.remove("border-[#d5e880]");
          item.classList.add("border-transparent");
        });

        this.classList.remove("border-transparent");
        this.classList.add("border-[#d5e880]");
      });
    });
  </script>
