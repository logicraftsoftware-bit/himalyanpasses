    <script>
      const params = new URLSearchParams(window.location.search);
      const pathParts = window.location.pathname.split("/").filter(Boolean);
      const slug =
        params.get("slug") ||
        (pathParts[0] === "category" ? pathParts[1] : null);
      const currentSlug = slug;

      setTimeout(() => {
        const allCards = document.querySelectorAll(".category-card");

        allCards.forEach((card) => {
          if (card.dataset.slug === currentSlug) {
            card.classList.add("active");
          }
        });
      }, 0);

      // Load Includes

      loadInclude("includes/header.html", "header").then(() => {
        toggleBtn(); //function are defined in common.js

        loadCategory(); //function are defined in comoon.js

        upcomingdropdown(); //function are defined in common.js

        //log out btn

        document

          .getElementById("logout-btn")

          .addEventListener("click", function () {
            logout(); //function are defined in users.js
          });
      });

      loadInclude("includes/footer.html", "footer").then(() => {
        loadSettings(); // ðŸ”¥ footer load howar por
      });

      document.addEventListener("DOMContentLoaded", function () {
        loadCategoriesBlogs(slug);

        loadBlogCategories();
      });
    </script>

    <script>
      //for paginatiion

      function renderPagination(totalPages, currentPage) {
        const pagination = document.getElementById("pagination");

        pagination.innerHTML = "";

        function createBtn(i) {
          const btn = document.createElement("button");

          btn.textContent = i;

          btn.className =
            i === currentPage
              ? "w-11 h-11 rounded-full bg-[#d5e880]"
              : "w-11 h-11 rounded-full bg-white border";

          btn.addEventListener("click", () => loadBlogs(i));

          return btn;
        }

        function createDots() {
          const span = document.createElement("span");

          span.textContent = "...";

          span.className = "px-2 text-slate-500";

          return span;
        }

        // ðŸ”™ PREV BUTTON

        const prev = document.createElement("button");

        prev.textContent = "â†";

        prev.className = "w-11 h-11 rounded-full bg-white border";

        prev.disabled = currentPage === 1;

        prev.onclick = () => loadBlogs(currentPage - 1);

        pagination.appendChild(prev);

        // ðŸ‘‰ First page

        pagination.appendChild(createBtn(1));

        // ðŸ‘‰ Left dots

        if (currentPage > 3) {
          pagination.appendChild(createDots());
        }

        // ðŸ‘‰ Middle pages

        for (
          let i = Math.max(2, currentPage - 1);
          i <= Math.min(totalPages - 1, currentPage + 1);
          i++
        ) {
          pagination.appendChild(createBtn(i));
        }

        // ðŸ‘‰ Right dots

        if (currentPage < totalPages - 2) {
          pagination.appendChild(createDots());
        }

        // ðŸ‘‰ Last page

        if (totalPages > 1) {
          pagination.appendChild(createBtn(totalPages));
        }

        // ðŸ”œ NEXT BUTTON

        const next = document.createElement("button");

        next.textContent = "â†’";

        next.className = "w-11 h-11 rounded-full bg-white border";

        next.disabled = currentPage === totalPages;

        next.onclick = () => loadBlogs(currentPage + 1);

        pagination.appendChild(next);
      }
    </script>
