    <!-- for pagination  -->
    <script>
        const blogCards = document.querySelectorAll(".blog-card");
        const pagination = document.getElementById("pagination");
        let currentPage = 1;

        function getItemsPerPage() {
            return window.innerWidth < 768 ? 6 : 12;
        }

        function showPage(page) {
            const itemsPerPage = getItemsPerPage();
            const start = (page - 1) * itemsPerPage;
            const end = start + itemsPerPage;

            blogCards.forEach((card, index) => {
                if (index >= start && index < end) {
                    card.classList.remove("hidden");
                } else {
                    card.classList.add("hidden");
                }
            });

            currentPage = page;
            renderPagination();
        }

        function renderPagination() {
            const itemsPerPage = getItemsPerPage();
            const totalPages = Math.ceil(blogCards.length / itemsPerPage);

            pagination.innerHTML = "";

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement("button");
                btn.textContent = i;
                btn.className = i === currentPage
                    ? "w-11 h-11 rounded-full bg-[#d5e880] text-slate-900 font-semibold plus-jakarta-sans border border-[#d5e880] shadow-sm transition"
                    : "w-11 h-11 rounded-full bg-white text-slate-700 font-semibold plus-jakarta-sans border border-slate-200 hover:bg-[#d5e880] hover:text-slate-900 hover:border-[#d5e880] transition";

                btn.addEventListener("click", () => showPage(i));
                pagination.appendChild(btn);
            }
        }

        window.addEventListener("resize", () => {
            showPage(1);
        });

        showPage(1);
    </script>
