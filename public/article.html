  <script>
    async function loadLimitedBlog(limit) {
      try {
        // const endpoint = API_CONFIG?.ENDPOINTS?.BLOGS || "/api/blogs";
        const endpoint = "/api/blogs/recent/list?limit=" + limit;
        const url = API_CONFIG.getUrl(endpoint);
        const response = await fetch(url);
        if (!response.ok) {

        }

        const data = await response.json();

        // console.log("Limited Blogs:", data);
        const recentBlog = document.getElementById("recentBlog");
        recentBlog.innerHTML = "";
        // âœ… EMPTY CHECK
        if (!Array.isArray(data) || data.length === 0) {
          recentBlog.innerHTML = `
                        <div class="col-span-full text-center py-10">
                            <p class="text-slate-500 text-lg plus-jakarta-sans">
                                No Recent Blogs Found ðŸ˜¢
                            </p>
                        </div>
                    `;
          return;
        }

        data.forEach((recentblog) => {
          const createdAt = new Date(recentblog.createdAt);
          const options = { year: "numeric", month: "short", day: "2-digit" };
          const formattedDate = createdAt.toLocaleDateString(
            "en-US",
            options,
          );
          const words = recentblog.content.trim().split(/\s+/).length;
          const readTimes = Math.ceil(words / 200);
          const title = limitWords(recentblog.heading, 12);
          const description = limitWords(recentblog.metaDescription, 15);
          const card = `

                       <!-- Image -->
                    <div class="w-full lg:w-[50%] overflow-hidden rounded-[24px]">
                        <img src="${recentblog.thumbnail.url || "./images/blog1.webp"}" alt="blog-photo"
                            class="w-full h-[260px] md:h-[420px] object-cover hover:scale-105 transition duration-700">
                    </div>

                    <!-- Content -->
                    <div class="flex-1 flex flex-col justify-center">
                        <!-- Meta -->
                        <div class="flex flex-wrap items-center gap-4 mb-5 plus-jakarta-sans">
                            <span
                                class="inline-flex items-center px-3 py-1 rounded-full bg-[#d5e880]/25 text-[#6b7d22] text-xs font-semibold tracking-wide uppercase border border-[#d5e880]/40">
                                Featured
                            </span>

                            <span class="inline-flex items-center gap-2 text-slate-500 text-sm font-medium">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-[#8aa43c]" fill="none"
                                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M8 7V3m8 4V3m-9 8h10m-11 9h12a2 2 0 002-2V7a2 2 0 00-2-2H6a2 2 0 00-2 2v11a2 2 0 002 2z" />
                                </svg>
                                ${formattedDate || "N/A"}
                            </span>

                            <span class="inline-flex items-center gap-2 text-slate-500 text-sm font-medium">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-[#8aa43c]" fill="none"
                                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                               ${readTimes || "2 "} Min Read
                            </span>
                        </div>

                        <!-- Title -->
                        <h3
                            class="text-2xl md:text-4xl lg:text-[42px] font-bold leading-tight text-slate-900 mb-5 plus-jakarta-sans">
                             ${title || "No Title"}
                        </h3>

                        <!-- Description -->
                        <p class="text-slate-600 text-base md:text-lg leading-8 mb-8 plus-jakarta-sans">
                            ${description || ""}
                        </p>

                        <!-- Author + Read more -->
                         <div class="flex flex-col sm:flex-row sm:items-center lg:justify-end gap-5">
                            <a href="/blog/${recentblog.slug}"
                                class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-[#d5e880] text-slate-900 text-sm font-semibold tracking-[1.5px] uppercase plus-jakarta-sans border border-[#d5e880] hover:bg-white hover:text-slate-900 transition-all duration-300 shadow-sm">
                                <span>Read Article</span>

                            </a>
                        </div>

            `;

          recentBlog.innerHTML += card;

  <script>
    function filterCategory(category) {
      // active toggle
      document.querySelectorAll(".category-card").forEach((el) => {
        el.classList.remove("active");
      });

      if (event.target.classList.contains("category-card")) {
        event.target.classList.add("active");
      }

      console.log("Selected Category:", category);


    }

    //for paginatiion
    function renderPagination(totalPages, currentPage) {
      const pagination = document.getElementById("pagination");
      pagination.innerHTML = "";

      function createBtn(i) {
        const btn = document.createElement("button");
        btn.textContent = i;

        btn.className =
          i === currentPage
            ? "w-11 h-11 rounded-full bg-[#d5e880]"
            : "w-11 h-11 rounded-full bg-white border";

        btn.addEventListener("click", () => loadBlogs(i));
        return btn;
      }

      function createDots() {
        const span = document.createElement("span");
        span.textContent = "...";
        span.className = "px-2 text-slate-500";
        return span;
      }

      // ðŸ”™ PREV BUTTON
      const prev = document.createElement("button");
      prev.textContent = "â†";
      prev.className = "w-11 h-11 rounded-full bg-white border";
      prev.disabled = currentPage === 1;
      prev.onclick = () => loadBlogs(currentPage - 1);
      pagination.appendChild(prev);

      // ðŸ‘‰ First page
      pagination.appendChild(createBtn(1));

      // ðŸ‘‰ Left dots
      if (currentPage > 3) {
        pagination.appendChild(createDots());
      }

      // ðŸ‘‰ Middle pages
      for (
        let i = Math.max(2, currentPage - 1);
        i <= Math.min(totalPages - 1, currentPage + 1);
        i++
      ) {
        pagination.appendChild(createBtn(i));
      }

      // ðŸ‘‰ Right dots
      if (currentPage < totalPages - 2) {
        pagination.appendChild(createDots());
      }

      // ðŸ‘‰ Last page
      if (totalPages > 1) {
        pagination.appendChild(createBtn(totalPages));
      }

      // ðŸ”œ NEXT BUTTON
      const next = document.createElement("button");
      next.textContent = "â†’";
      next.className = "w-11 h-11 rounded-full bg-white border";
      next.disabled = currentPage === totalPages;
      next.onclick = () => loadBlogs(currentPage + 1);
      pagination.appendChild(next);
    }
  </script>
