  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const viewport = document.getElementById("ladakhViewport");
      const track = document.getElementById("ladakhTrack");
      const prevBtn = document.getElementById("ladakhPrev");
      const nextBtn = document.getElementById("ladakhNext");

      if (!viewport || !track || !prevBtn || !nextBtn) return;

      let autoScrollTimer = null;
      let resumeTimer = null;

      function getGap() {
        const styles = window.getComputedStyle(track);
        return parseFloat(styles.columnGap || styles.gap || 24) || 24;
      }

      function getStepWidth() {
        const cards = track.querySelectorAll(".ladakh-card");
        if (!cards.length) return viewport.clientWidth;
        const cardWidth = cards[0].getBoundingClientRect().width;
        return cardWidth + getGap();
      }

      function updateButtons() {
        const maxScroll = viewport.scrollWidth - viewport.clientWidth - 2;
        const atStart = viewport.scrollLeft <= 2;
        const atEnd = viewport.scrollLeft >= maxScroll;

        if (atStart) {
          prevBtn.setAttribute("disabled", "true");
          prevBtn.classList.add("opacity-40", "cursor-not-allowed");
        } else {
          prevBtn.removeAttribute("disabled");
          prevBtn.classList.remove("opacity-40", "cursor-not-allowed");
        }

        if (atEnd) {
          nextBtn.setAttribute("disabled", "true");
          nextBtn.classList.add("opacity-40", "cursor-not-allowed");
        } else {
          nextBtn.removeAttribute("disabled");
          nextBtn.classList.remove("opacity-40", "cursor-not-allowed");
        }
      }

      function scrollNext() {
        const maxScroll = viewport.scrollWidth - viewport.clientWidth - 2;

        if (viewport.scrollLeft >= maxScroll) {
          viewport.scrollTo({ left: 0, behavior: "smooth" });
          return;
        }

        viewport.scrollBy({ left: getStepWidth(), behavior: "smooth" });
      }

      function startAutoScroll() {
        stopAutoScroll();
        autoScrollTimer = setInterval(scrollNext, 3500);
      }

      function stopAutoScroll() {
        if (autoScrollTimer) {
          clearInterval(autoScrollTimer);
          autoScrollTimer = null;
        }
      }

      function pauseAutoScroll() {
        stopAutoScroll();
        clearTimeout(resumeTimer);
        resumeTimer = setTimeout(startAutoScroll, 5000);
      }

      nextBtn.addEventListener("click", function () {
        pauseAutoScroll();
        viewport.scrollBy({ left: getStepWidth(), behavior: "smooth" });
      });

      prevBtn.addEventListener("click", function () {
        pauseAutoScroll();
        viewport.scrollBy({ left: -getStepWidth(), behavior: "smooth" });
      });

      viewport.addEventListener("scroll", updateButtons, { passive: true });
      viewport.addEventListener("pointerdown", pauseAutoScroll, { passive: true });
      viewport.addEventListener("mouseenter", stopAutoScroll);
      viewport.addEventListener("mouseleave", startAutoScroll);
      window.addEventListener("resize", updateButtons, { passive: true });

      new MutationObserver(function () {
        updateButtons();
        startAutoScroll();
      }).observe(track, { childList: true });
      updateButtons();
      startAutoScroll();
    });
  </script>
