<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>Himalayan Passes | Trusted Trekking & Adventure Travel in Sikkim</title>
  <meta name="description"
    content="Discover the best trekking packages in Sikkim, Darjeeling, and North Bengal with Himalayan Passes. Explore Himalayan trails, camping tours, and guided mountain adventures." />
  <meta name="keywords"
    content="trekking packages in Sikkim, Himalayan treks, trekking in Darjeeling, North Bengal trekking, adventure tours, mountain trekking, guided treks, Himalayan Passes" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="./favicon/favicon.ico" type="image/x-icon" sizes="16x16" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
    rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gloock&display=swap" rel="stylesheet" />

  <style>
    .plus-jakarta-sans {
      font-family: "Plus Jakarta Sans", sans-serif;
      font-optical-sizing: auto;
      font-weight: 400;
      font-style: normal;
    }

    .gloock-regular {
      font-family: "Gloock", serif;
      font-weight: 400;
      font-style: normal;
    }

    #termsContent {
      word-break: normal;
      overflow-wrap: break-word;
      color: #334155;
      line-height: 1.8;
      margin: 45px;
    }

    /* Headings */
    #termsContent h2 {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #0f172a;
    }

    #termsContent h3 {
      font-size: 20px;
      font-weight: 600;
      margin-top: 24px;
      margin-bottom: 10px;
      color: #1e293b;
    }

    /* Paragraph */
    #termsContent p {
      margin-bottom: 10px;
    }

    /* List */
    #termsContent ul {
      padding-left: 20px;
      margin-bottom: 12px;
    }

    #termsContent li {
      margin-bottom: 6px;
    }

    /* Bold text */
    #termsContent strong {
      color: #0f172a;
    }
  </style>

  <style>
    /* Page Title */
    #pageTitle {
      font-size: 42px !important;
      font-weight: 700 !important;
      line-height: 1.2 !important;
      font-family: "Gloock", serif !important;
      color: #000 !important;
      margin-bottom: 20px !important;
    }

    /* if title contains inner tags from admin */
    #pageTitle * {
      font-size: inherit !important;
      font-weight: inherit !important;
      font-family: inherit !important;
      color: inherit !important;
    }

    /* Page Description */
    #pageDescription,
    #pageDescription p,
    #pageDescription span,
    #pageDescription div,
    #pageDescription li,
    #pageDescription a {
      font-size: 18px !important;
      font-family: "Plus Jakarta Sans", sans-serif !important;
      line-height: 1.8 !important;
      color: #000 !important;
    }

    /* headings inside description */
    #pageDescription h1 {
      font-size: 42px !important;
      font-family: "Gloock", serif !important;
    }

    #pageDescription h2 {
      font-size: 36px !important;
      font-family: "Gloock", serif !important;
    }

    #pageDescription h3 {
      font-size: 30px !important;
      font-family: "Gloock", serif !important;
    }

    #pageDescription h4 {
      font-size: 24px !important;
      font-family: "Gloock", serif !important;
    }

    #pageDescription h5 {
      font-size: 20px !important;
    }

    #pageDescription h6 {
      font-size: 18px !important;
    }
  </style>
</head>

<body>
  <section class="relative w-full min-h-[420px] md:min-h-[540px] overflow-hidden">
    <!-- Background -->
    <img id="pageBanner" src="./images/term-and-condition-banner.webp" alt="Term and Condition Banner"
      class="absolute inset-0 w-full h-full object-cover" />

    <!-- Overlays -->
    <div class="absolute inset-0 bg-black/50"></div>
    <div class="absolute inset-0 bg-gradient-to-r from-slate-950/85 via-slate-900/40 to-transparent"></div>
    <div class="absolute inset-x-0 bottom-0 h-32 bg-gradient-to-t from-slate-950/60 to-transparent"></div>

    <!-- Header -->
    <div id="header" class="relative z-30"></div>

    <!-- Content -->
    <div class="relative z-20 flex items-center min-h-[420px] md:min-h-[540px]">
      <div class="max-w-7xl mx-auto w-full px-6 lg:px-10 pt-28 md:pt-32">
        <div class="max-w-3xl">
         
          <h1 id="pageName"
            class="text-white text-center md:text-left text-3xl sm:text-4xl md:text-5xl leading-tight gloock-regular mb-5">
            Why Choose Us
          </h1>
        </div>
      </div>
    </div>
  </section>

  <!-- content -->
  <section>
    <div class="max-w-[85%] mx-auto">
      <div class="prose lg:prose-lg max-w-6xl mx-auto">
        <h2 id="pageTitle"></h2>
        <p id="pageDescription"></p>
      </div>
    </div>
  </section>
  <script src="config/apiConfig.js"></script>

  <script src="controllers/footerdetails.js"></script>

  <script src="controllers/function.js"></script>
  <script src="controllers/users.js"></script>
  <script src="./includes/script.js"></script>
  <script src="./includes/common.js"></script>

  <!-- footer section -->
  <div id="footer"></div>

  <!-- script added heere -->
  <script>
    loadInclude("includes/header.html", "header").then(() => {
      toggleBtn(); //function are defined in common.js
      loadCategory(); //function are defined in comoon.js
      loadAboutusToggle(); //function are defined in common.js
      upcomingdropdown(); //function are defined in common.js

      //log out btn
      document
        .getElementById("logout-btn")
        .addEventListener("click", function () {
          logout(); //function are defined in users.js
        });
    });
    // loadInclude('includes/footer.html', 'footer'); //function are defined in function.js
    loadInclude("includes/footer.html", "footer").then(() => {
      loadSettings(); // function are defined in footerdetails.js
      footerCategoryList(); //function are defined in footerdetails.js
      footerUpcomingDropdown(); //function are defined in footerdetails.js
    });

    const params = new URLSearchParams(window.location.search);
    slug = params.get("slug");
    const pageBanner = document.getElementById("pageBanner");
    pageBanner.onerror = function () {
      this.onerror = null;
      this.src = "./images/" + slug + "-banner.jpg";
    };
    pageBanner.src = "./images/" + slug + "-banner.webp";
    const pageName = document.getElementById("pageName");

    const pageTitle = document.getElementById("pageTitle");
    const pageDescription = document.getElementById("pageDescription");
    async function loadWhyChoose() {
      try {
        const endpoint = "/api/about-us-sections/slug/" + slug;
        const url = API_CONFIG.getUrl(endpoint);

        const response = await fetch(url);

        const data = await response.json();
        pageBanner.src = data.image.url; // Set banner image
        pageName.textContent = data.pageName;
        pageTitle.innerHTML = data.heading;
        pageDescription.innerHTML = data.content; // Get the first line as description
        // console.log("data:", data);
      } catch (error) {
        console.error("Error fetching Why Choose Us content:", error);
        pageDescription.innerHTML =
          "<p>Sorry, we are unable to load the content at this time. Please try again later.</p>";
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      loadWhyChoose();
    });
  </script>
</body>

</html>
