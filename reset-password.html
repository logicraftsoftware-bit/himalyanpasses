<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&family=Gloock&display=swap"
        rel="stylesheet">

    <style>
        .plus-jakarta-sans {
            font-family: "Plus Jakarta Sans", sans-serif;
        }

        .gloock-regular {
            font-family: "Gloock", serif;
        }
    </style>
</head>

<body>

<section class="relative min-h-screen overflow-hidden">

    <!-- Background -->
    <img src="./images/sign-in-page.webp"
        class="absolute inset-0 w-full h-full object-cover">

    <div class="absolute inset-0 bg-slate-950/35 backdrop-blur-[2px]"></div>

    <div class="relative z-10 min-h-screen flex items-center justify-center px-4 py-10">

        <div class="w-full max-w-6xl rounded-[36px] border border-white/20 bg-white/10 backdrop-blur-2xl shadow-2xl overflow-hidden">

            <div class="grid grid-cols-1 lg:grid-cols-2 min-h-[700px]">

                <!-- Left -->
                <div class="p-10 flex items-center justify-center">

                    <div class="w-full h-full rounded-[36px] bg-gradient-to-br from-white/20 via-white/10 to-white/5 border border-white/10 p-10 flex flex-col justify-center">

                        <div class="text-center">

                            <h2 class="text-white text-4xl gloock-regular mb-5">
                                Create New Password
                            </h2>

                            <p class="text-white/80 plus-jakarta-sans leading-7">
                                Your identity has been verified successfully.
                                Please create a strong password for your account.
                            </p>

                            <img src="./images/signin-img.webp"
                                class="w-full max-w-[350px] mx-auto mt-10 rounded-tl-[36px] rounded-br-[36px]">

                        </div>

                    </div>

                </div>

                <!-- Right -->
                <div class="p-10 flex items-center">

                    <div class="w-full max-w-md mx-auto">

                        <div class="mb-8">
                            <span class="inline-flex px-5 py-2 rounded-full bg-[#d5e880] text-slate-900 font-semibold">
                                Reset Password
                            </span>
                        </div>

                        <h2 class="text-white text-4xl gloock-regular mb-4">
                            Set New Password
                        </h2>

                        <p class="text-white/80 mb-8">
                            Enter a new password and confirm it.
                        </p>

                        <form id="resetPasswordForm" class="flex flex-col gap-6">

                            <!-- Email -->

                            <div>
                                <label class="block text-white mb-2">
                                    Email
                                </label>

                                <input
                                    type="email"
                                    id="email"
                                    readonly
                                    class="w-full h-14 px-5 rounded-2xl bg-white/20 border border-white/10 text-white">
                            </div>

                            <!-- Password -->

                            <div>
                                <label class="block text-white mb-2">
                                    New Password
                                </label>

                                <input
                                    type="password"
                                    id="password"
                                    placeholder="Enter new password"
                                    class="w-full h-14 px-5 rounded-2xl bg-white/20 border border-white/10 text-white">
                            </div>

                            <!-- Confirm Password -->

                            <div>
                                <label class="block text-white mb-2">
                                    Confirm Password
                                </label>

                                <input
                                    type="password"
                                    id="confirmPassword"
                                    placeholder="Confirm password"
                                    class="w-full h-14 px-5 rounded-2xl bg-white/20 border border-white/10 text-white">
                            </div>

                            <button
                                type="submit"
                                class="w-full bg-[#d5e880] text-slate-900 py-4 rounded-2xl font-semibold">
                                Update Password →
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<script src="config/apiConfig.js"></script>

<script>

const params = new URLSearchParams(window.location.search);

const email = params.get('email');
const otp = params.get('otp');

document.getElementById('email').value = email || '';

document.getElementById('resetPasswordForm')
.addEventListener('submit', async (e) => {

    e.preventDefault();

    const password =
        document.getElementById('password').value;

    const confirmPassword =
        document.getElementById('confirmPassword').value;

    if(password !== confirmPassword){
        alert('Passwords do not match');
        return;
    }

    try {

        const endpoint = "/api/auth/reset-password";

        const url = API_CONFIG.getUrl(endpoint);

        const response = await fetch(url,{
            method:'POST',
            headers:{
                'Content-Type':'application/json'
            },
            body:JSON.stringify({
                email,
                newPassword: password,
                otp
            })
        });

        const data = await response.json();

        if(response.ok){

            alert('Password updated successfully');

            window.location.href = "/signin";

        }else{

            alert(data.message);

        }

    } catch(error){

        console.error(error);

        alert('Something went wrong');

    }

});

</script>

</body>
</html>
